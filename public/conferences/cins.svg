<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0d1a2a"/>
      <stop offset="100%" stop-color="#07070A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>
  <circle cx="200" cy="180" r="280" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#22D3EE" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="480"/>
    <line x1="160" y1="0" x2="160" y2="480"/>
    <line x1="240" y1="0" x2="240" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="480"/>
    <line x1="400" y1="0" x2="400" y2="480"/>
    <line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="560" y1="0" x2="560" y2="480"/>
    <line x1="640" y1="0" x2="640" y2="480"/>
    <line x1="720" y1="0" x2="720" y2="480"/>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="798" height="478" fill="none" stroke="#22D3EE" stroke-opacity="0.2" stroke-width="1" rx="12"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="800" height="3" fill="#22D3EE" opacity="0.7" rx="2"/>

  <!-- Badge chip -->
  <rect x="40" y="38" width="110" height="26" rx="13" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-opacity="0.35" stroke-width="1"/>
  <text x="95" y="56" fill="#22D3EE" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2">CONFERENCE</text>

  <!-- Main title -->
  <text x="40" y="148" fill="#F8FAFC" font-family="system-ui,sans-serif" font-size="88" font-weight="800" letter-spacing="-3">CINS</text>

  <!-- Year bar -->
  <text x="40" y="195" fill="#22D3EE" font-family="system-ui,sans-serif" font-size="20" font-weight="600" letter-spacing="4">2024 &amp; 2025</text>

  <!-- Divider -->
  <line x1="40" y1="218" x2="320" y2="218" stroke="#22D3EE" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="40" y="250" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="15" font-weight="400">Facilitator &amp; Session Compčre</text>
  <text x="40" y="272" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="13" font-weight="400" opacity="0.7">BITS Pilani Dubai Campus</text>

  <!-- Decorative dots -->
  <circle cx="680" cy="380" r="60" fill="#22D3EE" fill-opacity="0.04" stroke="#22D3EE" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="680" cy="380" r="35" fill="#22D3EE" fill-opacity="0.05" stroke="#22D3EE" stroke-opacity="0.18" stroke-width="1"/>
  <circle cx="680" cy="380" r="10" fill="#22D3EE" fill-opacity="0.25"/>

  <!-- Photo placeholder hint -->
  <rect x="500" y="60" width="260" height="320" rx="12" fill="#22D3EE" fill-opacity="0.04" stroke="#22D3EE" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="630" y="215" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" opacity="0.5">Drop photo here</text>
  <text x="630" y="232" fill="#94A3B8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" opacity="0.35">public/conferences/cins.jpg</text>
</svg>
